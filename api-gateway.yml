server:
  port: 8888

spring:
  cloud:
    gateway:
        # cors 처리
        # 각 서비스 모듈은 웹브라우저와 직접 통신하지 않으므로 단일진입점인 gateway가 담당
        globalcors:
            cors-configurations: 
                '[/**]':
                    allowedOrigins:
                        - 'http://localhost:3000'
                    allowedMethods: '*'
                    allowedHeaders: '*'
                    exposedHeaders: '*'
                    allowCredentials: true

        # eureka server에 등록된 client 찾아서 사용자의 url_pattern을 매핑하는 작업
        routes:
            - id: user-service
              predicates: 
                - Path=/user-service/**
              filters:
                # 첫번째 접두어를 제거하라는 의미
                # browser : http://server.XXXX.shop/user-service/users/signIn
                # inner   : http://server.XXXX.shop/users/signIn
                - StripPrefix=1
              uri: http://user-service

            - id: product-service
              predicates: 
                - Path=/product-service/**
              filters:
                # 첫번째 접두어를 제거하라는 의미
                # browser : http://server.XXXX.shop/product-service/product/create
                # inner   : http://server.XXXX.shop/product/create
                - StripPrefix=1
              uri: http://product-service
            
            - id: order-service
              predicates: 
                - Path=/order-service/**
              filters:
                # 첫번째 접두어를 제거하라는 의미
                # browser : http://server.XXXX.shop/order-service/order/create
                # inner   : http://server.XXXX.shop/order/create
                - StripPrefix=1
              uri: http://order-service
                 
                  

jwt:
  secret: syjjj-super-secret-key-for-jwt-123456789

